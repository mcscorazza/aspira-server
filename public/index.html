<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aspira Cloud - Instrumentação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans p-2 md:p-8">
    <div
      class="max-w-5xl mx-auto bg-white rounded-xl shadow-md overflow-hidden"
    >
      <div
        class="bg-blue-600 p-4 md:p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4"
      >
        <h1 class="text-xl md:text-2xl font-bold">
          <i class="fas fa-cloud mr-2"></i> Aspira Cloud
        </h1>

        <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
          <input
            type="file"
            id="arquivoInput"
            class="hidden"
            onchange="fazerUpload()"
          />
          <label
            for="arquivoInput"
            class="bg-white text-blue-600 px-4 py-2 rounded font-semibold cursor-pointer hover:bg-gray-100 transition text-center w-full md:w-auto shadow"
          >
            <i class="fas fa-upload mr-1"></i> Subir Arquivo
          </label>
        </div>
      </div>

      <div id="containerProgresso" class="hidden bg-white p-4 border-b">
        <div
          class="flex justify-between text-sm text-gray-600 mb-1 font-medium"
        >
          <span>Enviando arquivo...</span>
          <span id="textoProgresso">0%</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
          <div
            id="barraProgresso"
            class="bg-blue-600 h-2.5 rounded-full transition-all duration-300"
            style="width: 0%"
          ></div>
        </div>
      </div>

      <div
        class="bg-gray-100 p-3 border-b text-sm text-gray-600 overflow-x-auto whitespace-nowrap"
        id="breadcrumb"
      >
        <i class="fas fa-home"></i> / root /
      </div>

      <div class="p-0 overflow-x-auto w-full">
        <div
          class="hidden md:grid md:grid-cols-12 bg-gray-50 border-b text-gray-500 text-sm font-medium p-4"
        >
          <div class="col-span-1">
            <input type="checkbox" id="selectAll" onclick="toggleTodos(this)" />
          </div>
          <div class="col-span-4">Nome</div>
          <div class="col-span-2">Tamanho</div>
          <div class="col-span-3">Modificado em</div>
          <div class="col-span-2 text-right">Ação</div>
        </div>

        <div id="listaArquivos" class="divide-y divide-gray-100">
          <div class="p-8 text-center text-gray-500">
            Carregando arquivos...
          </div>
        </div>
      </div>
    </div>

    <div
      id="fabDownload"
      class="hidden fixed bottom-8 right-8 flex flex-col gap-2"
    >
      <button
        onclick="baixarSelecionados()"
        class="bg-green-600 text-white p-4 rounded-full shadow-2xl hover:bg-green-700 transition-all flex items-center gap-2"
      >
        <i class="fas fa-file-archive text-xl"></i>
        <span class="font-bold"
          >Baixar ZIP (<span id="countSelected">0</span>)</span
        >
      </button>
    </div>

    <script>
      const API_URL = "/api";
      let prefixoAtual = "root/";

      function formatarTamanho(bytes) {
        if (bytes === 0) return "0 Bytes";
        const k = 1024;
        const tamanhos = ["Bytes", "KB", "MB", "GB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return (
          parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + tamanhos[i]
        );
      }

      async function carregarArquivos(prefixo = "root/") {
        prefixoAtual = prefixo;
        document.getElementById("breadcrumb").innerHTML =
          `<i class="fas fa-folder-open text-blue-500"></i> ${prefixoAtual}`;
        const tbody = document.getElementById("listaArquivos");
        tbody.innerHTML =
          '<tr><td colspan="4" class="p-8 text-center text-gray-500"><i class="fas fa-spinner fa-spin"></i> Carregando...</td></tr>';

        try {
          const resposta = await fetch(
            `${API_URL}/listar?prefixo=${encodeURIComponent(prefixo)}`,
          );
          const dados = await resposta.json();
          tbody.innerHTML = "";

          if (prefixoAtual !== "root/") {
            const tr = document.createElement("tr");
            tr.className = "border-b hover:bg-gray-50 cursor-pointer";
            const pastaPai =
              prefixoAtual.split("/").slice(0, -2).join("/") + "/";
            tr.onclick = () => carregarArquivos(pastaPai);
            tr.innerHTML = `<td class="p-4 text-blue-600" colspan="4"><i class="fas fa-level-up-alt mr-2"></i> Voltar</td>`;
            tbody.appendChild(tr);
          }

          dados.pastas.forEach((pasta) => {
            const nomeExibicao = pasta.replace(prefixoAtual, "");
            const item = document.createElement("div");
            item.className =
              "p-4 hover:bg-gray-50 cursor-pointer flex items-center";
            item.onclick = () => carregarArquivos(pasta);
            item.innerHTML = `
        <div class="flex items-center w-full font-bold text-blue-800">
            <i class="fas fa-folder text-yellow-400 mr-3 text-2xl"></i>
            ${nomeExibicao}
        </div>
    `;
            tbody.appendChild(item);
          });

          dados.arquivos.forEach((arquivo) => {
            const item = document.createElement("div");
            item.className =
              "p-4 hover:bg-gray-50 flex flex-col md:grid md:grid-cols-12 gap-2 md:gap-0 items-start md:items-center";

            const dataFormatada = new Date(
              arquivo.dataModificacao,
            ).toLocaleString("pt-BR");

            item.innerHTML = `
                    <div class="md:col-span-1 mr-3 md:mr-0">
                        <input type="checkbox" class="file-checkbox w-5 h-5" value="${arquivo.chave}">
                    </div>

                    <div class="md:col-span-4 flex items-center w-full">
                        <i class="fas fa-file-alt text-gray-400 mr-3 text-xl"></i>
                        <span class="text-gray-800 font-medium break-all">${arquivo.nome}</span>
                    </div>

                    <div class="md:col-span-2 text-sm text-gray-500">
                        <span class="md:hidden font-semibold">Tamanho: </span>${formatarTamanho(arquivo.tamanho)}
                    </div>
                    <div class="md:col-span-3 text-sm text-gray-500">
                        <span class="md:hidden font-semibold">Data: </span>${dataFormatada}
                    </div>

                    <div class="md:col-span-2 w-full flex justify-end gap-2 mt-2 md:mt-0">
                        <button onclick="baixarArquivo('${arquivo.chave}')" class="flex-1 md:flex-none text-blue-600 hover:text-blue-800 bg-blue-50 px-4 py-2 md:py-1 rounded text-sm font-bold transition-colors text-center">
                            <i class="fas fa-download mr-1"></i> Baixar
                        </button>
                        <button onclick="excluirArquivo('${arquivo.chave}')" class="flex-1 md:flex-none text-red-600 hover:text-red-800 bg-red-50 px-4 py-2 md:py-1 rounded text-sm font-bold transition-colors text-center">
                            <i class="fas fa-trash-alt mr-1"></i> Excluir
                        </button>
                    </div>
                `;
            tbody.appendChild(item);
          });

          if (dados.pastas.length === 0 && dados.arquivos.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="4" class="p-8 text-center text-gray-500">A pasta está vazia.</td></tr>';
          }
        } catch (erro) {
          console.error("Erro:", erro);
          tbody.innerHTML =
            '<tr><td colspan="4" class="p-8 text-center text-red-500">Erro ao carregar arquivos.</td></tr>';
        }
      }

      async function baixarArquivo(chaveCompleta) {
        try {
          const resposta = await fetch(
            `${API_URL}/url-download?nome_arquivo=${encodeURIComponent(chaveCompleta.replace("root/", ""))}`,
          );
          const dados = await resposta.json();
          window.open(dados.url, "_blank");
        } catch (erro) {
          alert("Erro ao gerar link de download");
        }
      }

      async function fazerUpload() {
        const input = document.getElementById("arquivoInput");
        const arquivo = input.files[0];
        if (!arquivo) return;

        let pastaDestino = prefixoAtual;

        if (pastaDestino === "root/") {
          const dataHoje = new Date().toISOString().split("T")[0];
          pastaDestino = `root/${dataHoje}/`;
        }

        const caminhoCompleto = pastaDestino + arquivo.name;
        const nomeParaUpload = caminhoCompleto.replace("root/", "");

        const btnLabel = input.nextElementSibling;
        const textoOriginal = btnLabel.innerHTML;
        const containerProgresso =
          document.getElementById("containerProgresso");
        const barraProgresso = document.getElementById("barraProgresso");
        const textoProgresso = document.getElementById("textoProgresso");

        try {
          btnLabel.innerHTML = `<i class="fas fa-spinner fa-spin mr-1"></i> Autorizando...`;
          btnLabel.classList.add("pointer-events-none", "opacity-50");

          const respostaBackend = await fetch(
            `${API_URL}/url-upload?nome_arquivo=${encodeURIComponent(nomeParaUpload)}`,
          );
          const dados = await respostaBackend.json();

          containerProgresso.classList.remove("hidden");
          barraProgresso.style.width = "0%";
          textoProgresso.innerText = "0%";
          btnLabel.innerHTML = `<i class="fas fa-upload mr-1"></i> Enviando...`;

          const xhr = new XMLHttpRequest();
          xhr.open("PUT", dados.url, true);
          xhr.setRequestHeader("Content-Type", arquivo.type);

          xhr.upload.onprogress = function (evento) {
            if (evento.lengthComputable) {
              const percentual = Math.round(
                (evento.loaded / evento.total) * 100,
              );
              barraProgresso.style.width = percentual + "%";
              textoProgresso.innerText = percentual + "%";
            }
          };

          xhr.onload = function () {
            btnLabel.innerHTML = textoOriginal;
            btnLabel.classList.remove("pointer-events-none", "opacity-50");

            if (xhr.status === 200) {
              textoProgresso.innerText = "100% - Concluído!";
              input.value = "";
              carregarArquivos(prefixoAtual);

              setTimeout(() => {
                containerProgresso.classList.add("hidden");
              }, 2000);
            } else {
              alert("Erro ao enviar para o S3. Status: " + xhr.status);
              containerProgresso.classList.add("hidden");
            }
          };

          xhr.onerror = function () {
            alert("Erro de rede ao tentar enviar o arquivo.");
            btnLabel.innerHTML = textoOriginal;
            btnLabel.classList.remove("pointer-events-none", "opacity-50");
            containerProgresso.classList.add("hidden");
          };

          xhr.send(arquivo);
        } catch (erro) {
          console.error("Erro:", erro);
          alert("Erro ao iniciar o upload.");
          btnLabel.innerHTML = textoOriginal;
          btnLabel.classList.remove("pointer-events-none", "opacity-50");
        }
      }

      async function excluirArquivo(chaveCompleta) {
        const nomeArquivo = chaveCompleta.split("/").pop();
        if (
          !confirm(
            `TEM CERTEZA absoluta que deseja excluir o arquivo:\n\n"${nomeArquivo}"\n\nEsta ação não pode ser desfeita.`,
          )
        ) {
          return;
        }

        try {
          const resposta = await fetch(
            `${API_URL}/excluir?chave=${encodeURIComponent(chaveCompleta)}`,
            {
              method: "DELETE",
            },
          );

          if (resposta.ok) {
            carregarArquivos(prefixoAtual);
          } else {
            alert("Erro ao excluir arquivo no servidor.");
          }
        } catch (erro) {
          console.error("Erro:", erro);
          alert("Erro de conexão ao tentar excluir o arquivo.");
        }
      }

      document.addEventListener("change", function (e) {
        if (
          e.target.classList.contains("file-checkbox") ||
          e.target.id === "selectAll"
        ) {
          const selecionados = document.querySelectorAll(
            ".file-checkbox:checked",
          ).length;
          const fab = document.getElementById("fabDownload");
          const count = document.getElementById("countSelected");

          if (selecionados > 0) {
            fab.classList.remove("hidden");
            count.innerText = selecionados;
          } else {
            fab.classList.add("hidden");
          }
        }
      });

      function toggleTodos(source) {
        const checkboxes = document.querySelectorAll(".file-checkbox");
        checkboxes.forEach((cb) => (cb.checked = source.checked));
      }

      async function baixarSelecionados() {
        const checkboxes = document.querySelectorAll(".file-checkbox:checked");
        const chaves = Array.from(checkboxes).map((cb) => cb.value);

        const btn = document.querySelector("#fabDownload button");
        const originalHtml = btn.innerHTML;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Gerando ZIP...`;
        btn.disabled = true;

        try {
          const response = await fetch(`${API_URL}/baixar-zip`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chaves }),
          });

          if (response.ok) {
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `backup_imov_${new Date().toLocaleDateString()}.zip`;
            document.body.appendChild(a);
            a.click();
            a.remove();
          } else {
            alert("Erro ao gerar o pacote ZIP.");
          }
        } catch (error) {
          console.error(error);
          alert("Erro na conexão com o servidor.");
        } finally {
          btn.innerHTML = originalHtml;
          btn.disabled = false;
        }
      }

      carregarArquivos();
    </script>
  </body>
</html>
